<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>作業三 3D 模型展示選單</title>
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .section { margin-bottom: 50px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        babylon { width: 100%; height: 400px; display: block; }
    </style>
</head>
<body>

    <h1>作業三：網站模型展示</h1>

    <div class="section">
        <h2>1. Sketchfab 展示</h2>
        <div style="height:400px;">
            <p>(請將你在 Sketchfab 複製的 Embed 程式碼貼在此處)</p>
        </div>
    </div>

    <div class="section">
        <h2>2. Babylon Viewer Basic</h2>
        <babylon extends="minimal" model="你的檔名.glb"></babylon>
    </div>

    <div class="section">
        <h2>3. Babylon Viewer Select</h2>
        <p>展示模型 (Select)：</p>
        <babylon model="你的檔名.glb" templates.main.params.fill-container="true"></babylon>
    </div>

    <div class="section">
        <h2>4. Babylon Viewer Navbar</h2>
        <babylon model="你的檔名.glb" templates.nav-bar.params.visibility="visible"></babylon>
    </div>

</body>
</html>
